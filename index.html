<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="3">
<title>스마트 실내 환경 알림 시스템</title>
<style>
  body { font-family: 'Malgun Gothic', sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 30px; }
  h1 { font-size: 22px; margin-bottom: 30px; }

  .status-box { display: inline-block; width: 280px; padding: 30px; border-radius: 16px; margin: 10px;
    {% if state.gas_detected %}
      background: #5c1a1a; border: 3px solid #e63946;
    {% elif state.weather_bad %}
      background: #1a3d2b; border: 3px solid #52b788;
    {% else %}
      background: #16213e; border: 3px solid #4895ef;
    {% endif %}
  }

  .big-text { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
  .sub-text { font-size: 14px; color: #ccc; }

  .info-row { margin-top: 30px; font-size: 14px; color: #aaa; }
  .info-row span { color: #fff; font-weight: bold; }

  button { margin-top: 30px; padding: 14px 40px; font-size: 16px; border: none; border-radius: 10px;
    background: #e63946; color: white; cursor: pointer; }
  button:hover { background: #c81f2b; }

  .led-row { margin-top: 20px; }
  .led { display: inline-block; width: 20px; height: 20px; border-radius: 50%; margin: 0 8px; }
</style>
</head>
<body>

<h1>🏠 스마트 실내 환경 알림 시스템</h1>

<div class="status-box">
  {% if state.gas_detected %}
    <div class="big-text">🔴 가스 감지!</div>
    <div class="sub-text">환기하세요 (창문을 여세요)</div>
  {% elif state.weather_bad %}
    <div class="big-text">🟢 외부 환경 나쁨</div>
    <div class="sub-text">창문을 닫으세요</div>
  {% else %}
    <div class="big-text">🔵 정상</div>
    <div class="sub-text">현재 이상 없음</div>
  {% endif %}
</div>

<div class="led-row">
  <span class="led" style="background:{{ '#e63946' if state.gas_detected else '#333' }}"></span>
  <span class="led" style="background:{{ '#52b788' if state.weather_bad and not state.gas_detected else '#333' }}"></span>
  <span class="led" style="background:#4895ef"></span>
</div>

<div class="info-row">
  미세먼지(PM2.5): <span>{{ state.pm25 }}</span> &nbsp;|&nbsp;
  날씨 상태: <span>{{ state.condition }}</span> &nbsp;|&nbsp;
  음소거: <span>{{ "예" if state.muted else "아니오" }}</span>
</div>

<form action="/mute" method="post">
  <button type="submit">🔇 경보음 끄기</button>
</form>

<div style="margin-top:20px; font-size:11px; color:#666;">3초마다 자동 새로고침됩니다</div>

</body>
</html>
